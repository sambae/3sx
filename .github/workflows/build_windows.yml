name: Build (Windows)

on:
    workflow_dispatch:
    # Disabled while iterating on the Flatpak PR workflow.
    # pull_request:
    #     branches: [ "main" ]

jobs:
    build:
        runs-on: windows-latest

        defaults:
            run:
                shell: msys2 {0}

        steps:
          - id: msys2
            uses: msys2/setup-msys2@v2
            with:
                update: true
                msystem: MINGW64

          - name: Checkout repository
            uses: actions/checkout@v4
            with:
                submodules: true

          - name: Install MSYS2 packages
            run: tr -d '\r' < tools/requirements-windows.txt | xargs pacman -S --needed --noconfirm

          - name: Cache dependencies
            uses: actions/cache@v4
            with:
                path: third_party
                key: ${{ runner.os }}-deps-${{ hashFiles('build-deps.sh') }}

          - name: Build dependencies
            run: sh build-deps.sh

          - name: Build for Windows
            run: |
                set -o pipefail

                CC=clang CXX=clang++ cmake -B build \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DMSYS2_LOCATION=${{ steps.msys2.outputs.msys2-location }}

                cmake --build build --parallel 2>&1 | tee build.log

          - name: Upload build log
            if: always()
            uses: actions/upload-artifact@v4
            with:
                name: build-log
                path: build.log
